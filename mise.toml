#:schema https://mise.en.dev/schema/mise.json
min_version = "2026.6.10"

[tools]
node = "24"
pnpm = "10"
prek = "0.4.4"
pinact = "4.1.0"

[tasks.precommit]
description = "Run all pre-commit hooks via prek"
run = "prek run"

[tasks.precommit-validate]
description = "Validate the prek pre-commit configuration"
run = "prek validate-config"

[tasks.workflow-check]
description = "Pin GitHub Actions and Reusable Workflows"
run = "pinact run"

[tasks.download-schema]
description = "Download GraphQL schema from github.com"
run = "curl -O https://docs.github.com/public/fpt/schema.docs.graphql"

[tasks.e2e-test]
description = "Execute E2E, build and production build"
env = { GITHUB_API_ENDPOINT = "http://localhost:4000" }
run = ["pnpm run build", "pnpm run test:e2e"]

[tasks.e2e-show-report]
description = "Display E2E tests report"
run = ["pnpm exec playwright show-report"]
